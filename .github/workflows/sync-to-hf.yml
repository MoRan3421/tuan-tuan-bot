name: 🚀 Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动点击按钮运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: 🎋 Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ 错误: 未能在 GitHub Secrets 中找到 HF_TOKEN！请前往仓库设置添加。"
            exit 1
          fi
          # 确保用户信息正确
          git config --global user.email "bot@tuantuan.bot"
          git config --global user.name "TuanTuan Sync Bot"
          
          # 强制推送到 Hugging Face 的 main 分支
          git push --force https://tuantuanbot:$HF_TOKEN@huggingface.co/spaces/tuantuanbot/tuan-tuan-bot main
