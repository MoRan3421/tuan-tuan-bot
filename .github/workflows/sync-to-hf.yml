name: 🚀 Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: 🛠️ Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: 🎋 Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ 错误: 未能在 GitHub Secrets 中找到 HF_TOKEN！"
            exit 1
          fi
          git config --global user.email "bot@tuantuan.bot"
          git config --global user.name "TuanTuan Sync Bot"
          
          # 直接推送到 HF。由于本地历史已经 LFS 化，Action 里的推送现在应该没问题了。
          git push --force https://tuantuanbot:$HF_TOKEN@huggingface.co/spaces/tuantuanbot/tuan-tuan-bot main
