name: Deploy TuanTuan Web to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build Web
        run: |
          cd web
          npm install
          npm run build
        env:
          VITE_DISCORD_PROVIDER_ID: oidc.discord
          VITE_GUILD_ID: ""
          VITE_API_BASE_URL: https://tuantuan-bot-tuantuanbot-28647-uc.a.run.app

      - name: '🚀 Bomb-proof Firebase Deploy'
        run: |
          # 1. Create absolute path for the key
          KEY_PATH="${{ github.workspace }}/firebase-key.json"
          
          # 2. Decode the secret
          echo "${{ secrets.GCP_SA_KEY }}" | base64 --decode > "$KEY_PATH"
          
          # 3. Export credentials for Firebase CLI
          export GOOGLE_APPLICATION_CREDENTIALS="$KEY_PATH"
          
          # 4. Deploy with explicit project flag
          cd web
          npx firebase-tools deploy --only hosting --project tuantuanbot-28647 --non-interactive
