name: Deploy TuanTuan Web to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build Web
        run: |
          cd web
          npm install
          npm run build
        env:
          VITE_DISCORD_PROVIDER_ID: oidc.discord
          VITE_GUILD_ID: ""
          VITE_API_BASE_URL: https://tuantuan-bot-tuantuanbot-28647-uc.a.run.app

      - name: '🚀 Bomb-proof Firebase Deploy'
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | base64 --decode > firebase-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/firebase-key.json
          # Deploy from the web subdirectory
          cd web
          npx firebase-tools deploy --only hosting --project tuantuanbot-28647 --non-interactive
