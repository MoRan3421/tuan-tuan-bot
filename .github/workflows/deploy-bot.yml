name: Deploy TuanTuan Bot to Cloud Run 24/7

on:
  push:
    branches:
      - main
    paths:
      - 'bot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: '🛠️ Bomb-proof Manual Auth'
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | base64 --decode > key.json
          gcloud auth activate-service-account --key-file=key.json
          gcloud config set project tuantuanbot-28647

      - name: Authorize Docker
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Authorize Docker
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and Push
        run: |
          docker build -t gcr.io/tuantuanbot-28647/tuantuan-bot ./bot
          docker push gcr.io/tuantuanbot-28647/tuantuan-bot

      - name: '🚀 Register Slash Commands'
        run: |
          cd bot
          npm install
          node deploy-commands.js
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy tuantuan-bot \
            --image gcr.io/tuantuanbot-28647/tuantuan-bot \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --min-instances 1 \
            --set-env-vars "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }},FIREBASE_PROJECT_ID=tuantuanbot-28647,FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }},FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }},GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }},Groq_Cloud_API=${{ secrets.Groq_Cloud_API }},FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true"
